  - date: '2026-06-03'
    rating: 2
    summary: >-
      USTC publishes no centralized public developer portal or documented
      institutional REST API. The most substantial publicly reachable technical
      asset is the USTC Open Source Software Mirror (LUG @ USTC), consumed over
      standard package-manager protocols with a live public status page and help
      docs but no formal REST API spec. A unified SSO (passport.ustc.edu.cn) and
      a campus GitLab exist but are gated to institution members with no public
      developer docs. No data.* open-data portal, course/SIS API, library
      (Alma/Primo/IIIF/OAI-PMH), or institutional-repository API was confirmed
      to be openly documented. No single official USTC GitHub org exists; only
      community/lab orgs (e.g., ustclug). All findings verified live; nothing
      fabricated.
