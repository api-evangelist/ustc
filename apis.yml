apis:
  - aid: ustc:mirrors
    name: USTC Open Source Software Mirror
    description: >-
      The USTC Open Source Software Mirror, operated by the campus Linux User
      Group (LUG @ USTC), is one of the largest open source software mirror
      services among universities in mainland China, hosting Debian, Ubuntu,
      Fedora, Arch Linux, CentOS and many other distributions. It is consumed
      over standard package-manager protocols (HTTP/HTTPS/rsync) rather than a
      formally documented REST API; configuration help and a public status page
      are provided.
    humanURL: https://mirrors.ustc.edu.cn/help/
