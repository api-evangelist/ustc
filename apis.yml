---
aid: ustc
name: University of Science and Technology of China
description: >-
  The University of Science and Technology of China (USTC, 中国科学技术大学) is a
  public research university in Hefei, Anhui, China, founded in 1958 under the
  Chinese Academy of Sciences. It is ranked #63 in the QS World University
  Rankings 2025. USTC does not publish a centralized, public developer portal or
  documented institutional API program. Its most visible publicly reachable
  technical footprint is the USTC Open Source Software Mirror operated by the
  campus Linux User Group (LUG @ USTC), along with a unified SSO/identity
  service and a campus GitLab. Most academic, library, and SIS systems sit
  behind the passport.ustc.edu.cn single sign-on and are not openly documented.
