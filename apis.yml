        url: https://github.com/ustclug/mirrorhelp
  - aid: ustc:passport
    name: USTC Unified Identity Authentication (Passport SSO)
    description: >-
      passport.ustc.edu.cn is the university's unified single sign-on / identity
      authentication service used by most campus websites and systems. It is a
      gated authentication endpoint for members of the institution; no public
      developer documentation or open client-registration API is published.
    humanURL: https://passport.ustc.edu.cn/
    baseURL: https://passport.ustc.edu.cn/
